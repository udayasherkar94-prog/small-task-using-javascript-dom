<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colorRectangle</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    #main{
        height: 300px;
        width: 500px;
        position: absolute;
        border: 2px solid black;
        top:50%;
        left: 50%;
        transform:translate(-50%,-50%);
    }
</style>
<body id="body">
    <div id="main"></div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>

    let rect = document.querySelector("#main");
    rect.addEventListener("mousemove", function(details){
        
         
        var rectanglelocation = rect.getBoundingClientRect();
        console.log(rectanglelocation)
       
        console.log(details)
        var insiderectval = details.clientX-rectanglelocation.left;


        if(insiderectval< rectanglelocation.width / 2){
            console.log("left")

            var redcolor = gsap.utils.mapRange(0,rectanglelocation.width / 2,255,0,insiderectval);

            gsap.to(rect,{
                backgroundColor:`rgb(${redcolor},0,0)`,
                ease:Power4,
            });
        }
        else if (insiderectval> rectanglelocation.width / 2){
            console.log("right")

            var bluecolor = gsap.utils.mapRange(rectanglelocation.width / 2,rectanglelocation.width,0,255,insiderectval);

            gsap.to(rect,{
                backgroundColor:`rgb(0,0,${bluecolor})`,
                ease:Power4,
            });
        }

        // else if(insiderectval === rectanglelocation.width / 2){
        //     console.log("center");
        //     gsap.to(rect,{
        //         backgroundColor:"rgb(255,255,255)",
                
        //     });
        // }

    })


    rect.addEventListener('mouseleave',function(){
        gsap.to(rect,{
            backgroundColor:'white',
            ease:Power4,
        })
    })



//     const mapper = gsap.utils.mapRange(0, 100, 0, 250);
// console.log(mapper(50)); // 125
// console.log(mapper(10)); // 25   
    //gsap.utils.mapRange(inMin, inMax, outMin, outMax, valueToMap) returns the mapped value directly.


</script>
</body>

</html>
